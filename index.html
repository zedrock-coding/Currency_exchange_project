<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Exchange</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Currency Exchange</h1>
    </header>
    
    <main>
        <div class="title">
            <h2>Hello!</h2>
            <p>Ready to exchange currencies!</p>
            <a href="https://www.freeforexapi.com">
                <img alt="Free Forex API" src="https://www.freeforexapi.com/Images/link.png" height="20">
            </a>
        </div>
        <div class="exchange_table">
            <form>
                <label for="amount">Amount:</label>
                <input type="number" id="amount" name="amount" required>
                
                <label for="from_currency">From Currency:</label>
                <select id="from_currency" name="from_currency" required>
                    <option value="USD">US Dollar</option>
                    <option value="EUR">Euro</option>
                    <option value="GBP">British Pound</option>
                    <option value="JPY">Japanese Yen</option>
                    <option value="AUD">Australian Dollar</option>
                    <option value="CAD">Canadian Dollar</option>
                    <option value="CHF">Swiss Franc</option>
                    <option value="CNH">Chinese Yuan</option>
                    <option value="HKD">Hong Kong Dollar</option>
                    <option value="NZD">New Zealand Dollar</option>
                </select>

                <label for="to_currency">To Currency:</label>
                <select id="to_currency" name="to_currency" required>
                    <option value="USD">US Dollar</option>
                    <option value="EUR">Euro</option>
                    <option value="GBP">British Pound</option>
                    <option value="JPY">Japanese Yen</option>
                    <option value="AUD">Australian Dollar</option>
                    <option value="CAD">Canadian Dollar</option>
                    <option value="CHF">Swiss Franc</option>
                    <option value="CNH">Chinese Yuan</option>
                    <option value="HKD">Hong Kong Dollar</option>
                    <option value="NZD">New Zealand Dollar</option>
                </select>

                <button type="submit" onclick="convert(event)">Convert</button>
            </form>
        </div>
        <div class="result">
            <ul id="pairs-list"></ul>
            <h2 id="result"></h2>
        </div>
    </main>
    
    <footer>
        <p>&copy; 2026 Currency Exchange. All rights reserved.</p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
