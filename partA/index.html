<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Exchange</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Currency Exchange</h1>
    </header>
    
    <main>
        <div class="title">
            <h2>Currency Converter</h2>
            <p>Ready to exchange currencies!</p>
        </div>
        <div class="exchange_table">
            <form id="exchange-form">
                <div class="input-group">
                    <label for="amount">Amount:</label>
                    <input type="number" id="amount" name="amount" placeholder="Enter amount..." required>
                </div>
                
                <div class="input-group">
                    <label for="from_currency">From Currency:</label>
                    <select id="from_currency" name="from_currency" required>
                        <option value="" disabled selected>Select Currency</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="to_currency">To Currency:</label>
                    <select id="to_currency" name="to_currency" required>
                        <option value="" disabled selected>Select Currency</option>
                    </select>
                </div>

                <div class="input-group">
                    <button type="button" id="convert-btn">Convert Currency</button>
                </div>
            </form>
        </div>
        <div class="result">
            <p><strong>Selected Pair:</strong> <span id="pair">None</span></p>
            <h2 id="result"></h2>
        </div>
    </main>
    
    <footer>
        <p>&copy; 2026 Currency Exchange. All rights reserved by Lakshya Jadhav.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
